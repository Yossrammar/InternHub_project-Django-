<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>InternHub</title>

    <!-- 🔥 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand" href="/">InternHub</a>

        <!-- MENU -->
        <div class="d-flex gap-2">

            {% if request.path != '/' %}

                {% if user.is_authenticated %}

                    {% if user.is_staff %}
                        <!-- 🏢 SOCIÉTÉ -->
                        <a href="{% url 'dashboard' %}" class="btn btn-warning btn-sm">
                            Dashboard
                        </a>

                        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                            Logout
                        </a>

                    {% else %}
                        <!-- 👤 STAGIAIRE -->
                        <a href="{% url 'profil_stagiaire' %}" class="btn btn-info btn-sm">
                            Profil
                        </a>

                        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                            Logout
                        </a>
                    {% endif %}

                {% endif %}

            {% endif %}

        </div>

    </div>
</nav>

<!-- 🔥 MESSAGES -->
<div class="container mt-3">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
</div>

<!-- 🔥 CONTENU -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
