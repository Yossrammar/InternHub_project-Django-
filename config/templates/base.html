<!DOCTYPE html>
<html>
<head>
    <title>InternHub</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="/">InternHub</a>

        <!-- Menu -->
        <div class="d-flex align-items-center gap-2">

            {% if user.is_authenticated %}

                <span class="text-white">Hello {{ user.username }}</span>

                {% if user.is_staff %}
                    <a class="btn btn-warning btn-sm" href="/dashboard/">Dashboard</a>
                {% else %}
                    <a class="btn btn-info btn-sm" href="/stages/">Stages</a>
                {% endif %}

                <!-- ✅ Logout en POST -->
                <form action="/logout/" method="POST" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn btn-danger btn-sm">Logout</button>
                </form>

            {% else %}

                <a class="btn btn-light btn-sm" href="/login/">Login</a>

            {% endif %}

        </div>

    </div>
</nav>

<!-- ✅ Messages bien placés -->
<div class="container mt-3">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}
</div>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
